version: '3.8'

services:
  raspis:
    build: .
    container_name: raspis_bot
    restart: always
    volumes:
      - .:/app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Если вы используете прокси от VPN:
      # - PROXY_URL=http://vpn:8888 
    depends_on:
      - redis
      # - vpn # Раскомментируйте, если используете VPN контейнер

  redis:
    image: redis:alpine
    container_name: redis_db
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  # Пример настройки VPN (Gluetun)
  # vpn:
  #   image: qmcgaw/gluetun
  #   container_name: vpn
  #   cap_add:
  #     - NET_ADMIN
  #   devices:
  #     - /dev/net/tun:/dev/net/tun
  #   environment:
  #     - VPN_SERVICE_PROVIDER=custom
  #     - VPN_TYPE=wireguard
  #     # Сюда вставляются настройки вашего VPN (из файла Happ/Hiddify/WG)
  #     - WIREGUARD_PRIVATE_KEY=ваш_ключ
  #     - WIREGUARD_ADDRESSES=10.0.0.2/32
  #     - PROXY_HTTP_SERVER_PORT=8888 # Порт прокси для бота
  #   restart: always

volumes:
  redis_data:
