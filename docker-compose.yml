version: '3.8'

services:
  # 🤖 Бот - интерфейс и логика Telegram
  bot:
    build: .
    container_name: raspis_bot
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROXY_URL=http://proxy:8888
    volumes:
      - bot_data:/app/data
      - shared_cache:/app/cache
    depends_on:
      - redis
      - proxy
    command: python bot.py

  # ⚙️ Воркеры (Скраперы) - парсинг сайта
  worker:
    build: .
    restart: always
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PROXY_URL=http://proxy:8888
    volumes:
      - shared_cache:/app/cache
    depends_on:
      - redis
      - proxy
    deploy:
      replicas: 5
    command: python scraper.py

  # 🌐 Прокси-сервер - туннель через внешний SOCKS5
  proxy:
    image: ginuerzh/gost
    container_name: network_proxy
    restart: always
    # ЗАМЕНИТЕ user:password@ip:port на ваши данные SOCKS5
    command: -L=:8888 -F=socks5://user377122:dolyzf@46.203.97.252:19377

  # 🗄️ База данных (Redis) - кэш и очередь
  redis:
    image: redis:alpine
    container_name: redis_db
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

volumes:
  redis_data:
  bot_data:
  shared_cache:
